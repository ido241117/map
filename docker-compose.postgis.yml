services:
  postgis:
    image: postgis/postgis:17-3.5
    container_name: osm_hcm_postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: osm_hcm
    ports:
      - '5433:5432'
    volumes:
      - osm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d osm_hcm']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  osm_pg_data:
