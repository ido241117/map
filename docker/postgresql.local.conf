# Local Docker Desktop tuning — see db.md §9
# Target: ~8 GB host RAM, PostGIS container limit ~4 GB

shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 128MB
random_page_cost = 1.1
effective_io_concurrency = 200
max_connections = 100

# WAL / checkpoint — reduce write spikes during bulk pregen
wal_buffers = 16MB
checkpoint_completion_target = 0.9
