services:
  postgis:
    image: postgis/postgis:17-3.5
    container_name: hcm_land_postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hcm_land_mvp
    ports:
      - '5433:5432'
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=2GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - wal_buffers=16MB
      - -c
      - checkpoint_completion_target=0.9
    volumes:
      - hcm_land_pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hcm_land_mvp']
      interval: 5s
      timeout: 5s
      retries: 30

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hcm_land_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    depends_on:
      postgis:
        condition: service_healthy
    volumes:
      - hcm_land_pgadmin_data:/var/lib/pgadmin

  osm_highways_postgis:
    image: postgis/postgis:17-3.5
    container_name: osm_highways_postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: osm_highways
    ports:
      - '5435:5432'
    volumes:
      - osm_highways_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d osm_highways']
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: hcm-land-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - '9200:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fs http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  hcm_land_pg_data:
  hcm_land_pgadmin_data:
  osm_highways_pg_data:
    external: true
    name: map_osm_highways_pg_data
  es_data:
